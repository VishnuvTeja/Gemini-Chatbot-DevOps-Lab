stages:
  - test
  - build
  - scan
  - push

variables:
  BACKEND_IMAGE: "$CI_REGISTRY_IMAGE/chatbot-backend"
  FRONTEND_IMAGE: "$CI_REGISTRY_IMAGE/chatbot-frontend"
  DOCKER_TLS_CERTDIR: ""

backend_test:
  stage: test
  image: python:3.12-slim
  script:
    - cd backend
    - pip install -r requirements.txt
    - GEMINI_API_KEY=test-key pytest

frontend_build:
  stage: test
  image: node:22-alpine
  script:
    - cd frontend
    - npm install
    - npm run build

docker_build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  script:
    - docker build -t backend:$CI_COMMIT_SHA backend
    - docker build -t frontend:$CI_COMMIT_SHA frontend

trivy_scan:
  stage: scan
  image: aquasec/trivy:latest
  services:
    - docker:27-dind
  script:
    - trivy fs --exit-code 1 --severity HIGH,CRITICAL .

registry_push:
  stage: push
  image: docker:27
  services:
    - docker:27-dind
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t backend:$CI_COMMIT_SHA backend
    - docker build -t frontend:$CI_COMMIT_SHA frontend
    - docker tag backend:$CI_COMMIT_SHA $BACKEND_IMAGE:$CI_COMMIT_SHA
    - docker tag frontend:$CI_COMMIT_SHA $FRONTEND_IMAGE:$CI_COMMIT_SHA
    - docker tag backend:$CI_COMMIT_SHA $BACKEND_IMAGE:latest
    - docker tag frontend:$CI_COMMIT_SHA $FRONTEND_IMAGE:latest
    - docker push $BACKEND_IMAGE:$CI_COMMIT_SHA
    - docker push $FRONTEND_IMAGE:$CI_COMMIT_SHA
    - docker push $BACKEND_IMAGE:latest
    - docker push $FRONTEND_IMAGE:latest
