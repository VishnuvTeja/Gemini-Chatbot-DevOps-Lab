name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository_owner }}/chatbot-backend
  FRONTEND_IMAGE: ${{ github.repository_owner }}/chatbot-frontend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Backend tests
        working-directory: backend
        run: |
          pip install -r requirements.txt
          GEMINI_API_KEY=test-key pytest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Frontend build
        working-directory: frontend
        run: |
          npm install
          npm run build

  build-scan-push:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images
        run: |
          docker build -t backend:${GITHUB_SHA} backend
          docker build -t frontend:${GITHUB_SHA} frontend

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: backend:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Trivy scan frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: frontend:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Push images
        run: |
          docker tag backend:${GITHUB_SHA} $REGISTRY/$BACKEND_IMAGE:${GITHUB_SHA}
          docker tag frontend:${GITHUB_SHA} $REGISTRY/$FRONTEND_IMAGE:${GITHUB_SHA}
          docker tag backend:${GITHUB_SHA} $REGISTRY/$BACKEND_IMAGE:latest
          docker tag frontend:${GITHUB_SHA} $REGISTRY/$FRONTEND_IMAGE:latest
          docker push $REGISTRY/$BACKEND_IMAGE:${GITHUB_SHA}
          docker push $REGISTRY/$FRONTEND_IMAGE:${GITHUB_SHA}
          docker push $REGISTRY/$BACKEND_IMAGE:latest
          docker push $REGISTRY/$FRONTEND_IMAGE:latest

      - name: Next GitOps step
        run: |
          echo "Update k8s/overlays/k3s/kustomization.yaml image tags to ${GITHUB_SHA}, then ArgoCD will sync."
