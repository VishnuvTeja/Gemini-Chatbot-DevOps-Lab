name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Backend tests
        working-directory: backend
        env:
          PYTHONPATH: .
        run: |
          pip install -r requirements.txt
          GEMINI_API_KEY=test-key pytest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Frontend build
        working-directory: frontend
        run: |
          npm install
          npm run build

  build-scan-push:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images
        run: |
          docker build -t backend:${{ github.sha }} backend
          docker build -t frontend:${{ github.sha }} frontend

      - name: Trivy scan backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: backend:${{ github.sha }}
          format: table
          exit-code: "0"  
          severity: CRITICAL,HIGH

      - name: Trivy scan frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: frontend:${{ github.sha }}
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

      - name: Push images
        run: |
          docker tag backend:${{ github.sha }} $REGISTRY/$BACKEND_IMAGE:${{ github.sha }}
          docker tag frontend:${{ github.sha }} $REGISTRY/$FRONTEND_IMAGE:${{ github.sha }}

          docker tag backend:${{ github.sha }} $REGISTRY/$BACKEND_IMAGE:latest
          docker tag frontend:${{ github.sha }} $REGISTRY/$FRONTEND_IMAGE:latest

          docker push $REGISTRY/$BACKEND_IMAGE:${{ github.sha }}
          docker push $REGISTRY/$FRONTEND_IMAGE:${{ github.sha }}

          docker push $REGISTRY/$BACKEND_IMAGE:latest
          docker push $REGISTRY/$FRONTEND_IMAGE:latest

      - name: Update image tags for ArgoCD
        run: |
          sed -i "s|newTag: .*|newTag: ${{ github.sha }}|g" k8s/overlays/k3s/kustomization.yaml

          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add k8s/overlays/k3s/kustomization.yaml

          git commit -m "Update image tag to ${{ github.sha }}" || echo "No changes to commit"

          git push